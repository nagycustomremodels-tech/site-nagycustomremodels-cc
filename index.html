<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagy Custom Remodeling | Coming Soon</title>
  <link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #D0551C;
      --bg: #0f0f0f;
      --text: #f0ede8;
      --muted: #777;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* ── Logo ── */
    .logo {
      text-decoration: none;
      margin-bottom: 3.5rem;
    }

    .logo img {
      height: 110px;
      width: auto;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(208, 85, 28, 0.10);
      border: 1px solid rgba(208, 85, 28, 0.28);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.12;
      margin-bottom: 1.25rem;
      letter-spacing: -0.025em;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    /* ── Sub ── */
    p.sub {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 440px;
      line-height: 1.75;
      margin-bottom: 3rem;
    }

    /* ── Buttons ── */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: filter 0.2s;
      min-width: 248px;
      justify-content: center;
    }

    .btn:hover { filter: brightness(1.1); }

    .btn-phone     { background: var(--accent); color: #fff; }
    .btn-whatsapp  { background: #25d366;       color: #fff; }

    /* ── Footer ── */
    .footer {
      margin-top: 4rem;
      font-size: 0.78rem;
      color: #3a3a3a;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <a href="#" class="logo">

  <div class="badge">Coming Soon</div>
