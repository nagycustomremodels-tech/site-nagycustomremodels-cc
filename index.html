<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagy Custom Remodels — Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    h1 span { color: #c8a96e; }
    p {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: #c8a96e22;
      border: 1px solid #c8a96e55;
      color: #c8a96e;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .location {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <h1 style="margin-top: 1.5rem;">Nagy <span>Custom</span> Remodels</h1>
    <p>We're putting the finishing touches on our new website.<br>Check back soon.</p>
    <p class="location">Jacksonville, FL</p>
  </div>
</body>
</html>
