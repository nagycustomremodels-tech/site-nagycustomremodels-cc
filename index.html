<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nagy Custom Remodeling | Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #D0551C;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --text: #f0ede8;
      --muted: #888;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      margin-bottom: 3rem;
    }

    .logo svg {
      width: 52px;
      height: 44px;
      stroke: var(--accent);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .logo-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(208, 85, 28, 0.12);
      border: 1px solid rgba(208, 85, 28, 0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    p.sub {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
      min-width: 240px;
      justify-content: center;
    }

    .btn:hover { opacity: 0.85; }

    .btn-phone {
      background: var(--accent);
      color: #fff;
    }

    .btn-whatsapp {
      background: #25d366;
      color: #fff;
    }

    .footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>

    Entre em contato diretamente:
